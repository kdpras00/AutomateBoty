<div id="presentation-panel" class="hidden mode-panel">
    <div class="panel-header">
        <div class="panel-title">Presentation Design</div>
        <p class="panel-desc">Desain slide otomatis dan persiapan presentasi.</p>
    </div>

    <div class="tools-grid">
        <div class="tool-group">
            <div class="tool-group-label">Terapkan Tema Otomatis</div>
            <div class="tool-btns">
                <button class="btn-outline theme-blue" onclick="terapkanTemaSlide('akademik-biru')">Akademik Biru</button>
                <button class="btn-outline theme-green" onclick="terapkanTemaSlide('akademik-hijau')">Forest Green</button>
                <button class="btn-outline theme-dark" onclick="terapkanTemaSlide('profesional-gelap')">Dark Pro</button>
                <button class="btn-outline theme-light" onclick="terapkanTemaSlide('minimalis')">Clean Minimalist</button>
            </div>
        </div>
        
        <div class="tool-group" style="margin-top:8px;">
            <div class="tool-group-label">Pembuatan Slide Cerdas</div>
            <button class="btn-primary" style="width:100%;" onclick="slideFromUploadedFile()">Buat Slide dari Dokumen (Perlu Upload)</button>
        </div>
        
        <!-- Practice Timer -->
        <div class="tool-group timer-group" style="margin-top:16px;">
            <div class="tool-group-label">Simulasi Presentasi</div>
            <div id="timer-display" class="timer-display">10:00</div>
            <div class="timer-controls">
                <input type="number" id="timer-minutes-input" value="10" min="1" max="120" class="timer-input" title="Menit">
                <span class="timer-label">mnt</span>
                <button id="timer-start-btn" class="btn-primary btn-sm" onclick="startPracticeTimer()">Mulai</button>
                <button id="timer-stop-btn" class="btn-outline btn-sm" onclick="stopPracticeTimer()" disabled>Jeda</button>
                <button class="btn-icon-outline" title="Reset" onclick="resetPracticeTimer()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 3v5h5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
            </div>
        </div>
    </div>
</div>
