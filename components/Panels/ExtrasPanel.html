<div id="templates-panel" class="hidden mode-panel">
    <div class="panel-header">
        <div class="panel-title">Template & Citation</div>
        <p class="panel-desc">Pilih template struktur dokumen atau buat sitasi otomatis.</p>
    </div>
    
    <div class="tool-group">
        <div class="tool-group-label" style="margin-bottom:8px;">Pilih Template Dokumen</div>
        <select id="template-select" class="select-input" onchange="if(this.value) applyBuiltinTemplate(this.value); this.value='';">
            <option value="">-- Pilih Template --</option>
            <option value="jurnal-indonesia">Jurnal Indonesia (IMRaD + APA)</option>
            <option value="jurnal-inggris">Journal English (IMRaD + IEEE)</option>
            <option value="artikel-ilmiah">Artikel Ilmiah (Populer + APA)</option>
            <option value="skripsi">Skripsi/TA (5 Bab Lengkap)</option>
            <option value="prosiding">Prosiding (Konferensi Bilingual)</option>
            <option value="makalah">Makalah (Tugas Kuliah)</option>
        </select>
    </div>

    <div class="tool-group" style="margin-top:16px;">
        <div class="tool-group-label">Sitasi & Daftar Pustaka</div>
        <textarea id="citation-input" placeholder="Masukkan detail: Penulis, Tahun, Judul, Jurnal, Vol, Hal..." rows="2" class="text-input" style="margin-bottom:8px;"></textarea>
        <div class="tool-btns">
            <button class="btn-outline" onclick="insertCitation('APA')">Format APA</button>
            <button class="btn-outline" onclick="insertCitation('IEEE')">Format IEEE</button>
            <button class="btn-outline" onclick="insertCitation('Chicago')">Chicago Style</button>
            <button class="btn-outline" onclick="insertCitation('Vancouver')">Vancouver</button>
        </div>
    </div>
</div>

<div id="history-panel" class="hidden mode-panel">
    <div class="panel-header" style="display:flex; justify-content:space-between; align-items:flex-start;">
        <div>
            <div class="panel-title">Riwayat Percakapan</div>
            <p class="panel-desc">Aktivitas dan sesi Anda sebelumnya.</p>
        </div>
        <button class="btn-icon-outline" onclick="clearHistory()" title="Hapus Semua Riwayat">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M3 6H5H21 M8 6V4C8 3.46957 8.21071 2.96086 8.58579 2.58579C8.96086 2.21071 9.46957 2 10 2H14C14.5304 2 15.0391 2.21071 15.4142 2.58579C15.7893 2.96086 16 3.46957 16 4V6 M19 6V20C19 20.5304 18.7893 21.0391 18.4142 21.4142C18.0391 21.7893 17.5304 22 17 22H7C6.46957 22 5.96086 21.7893 5.58579 21.4142C5.21071 21.0391 5 20.5304 5 20V6H19Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M10 11V17 M14 11V17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
    </div>
    <div class="history-list"></div>
</div>

<div id="settings-panel" class="hidden mode-panel">
    <div class="panel-header">
        <div class="panel-title">Pengaturan</div>
        <p class="panel-desc">Konfigurasi akun dan koneksi API.</p>
    </div>
    <div class="tool-group">
        <label class="tool-group-label" style="display:block; margin-bottom:4px;">Gemini API Key</label>
        <div class="search-box">
            <input type="password" id="api-key-input" class="text-input" placeholder="Masukkan Gemini API Key">
            <button id="save-settings" class="btn-primary">Simpan</button>
        </div>
        <p style="font-size:11px; color:var(--text-secondary); margin-top:8px;">Kunci API disimpan secara lokal di perangkat Anda.</p>
    </div>
    
    <div class="tool-group" style="margin-top:16px;">
        <div class="tool-group-label" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
            <span>Prompt Presets</span>
            <button class="btn-icon-outline btn-sm" onclick="saveCurrentAsPreset()" title="Simpan Chat Saat Ini">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 5V19 M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
        </div>
        <input type="text" id="preset-name-input" class="text-input" placeholder="Nama preset baru (opsional)" style="margin-bottom:8px;">
        <div id="presets-list"></div>
    </div>
</div>
