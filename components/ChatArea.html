<div class="chat-container" id="chat-container">
    <div class="message bot-message">
        <div class="message-content">
            <strong>AutomateBoty Workspace</strong><br><br>
            Pilih mode kerja di sidebar, atau langsung mulai mengetik untuk berdiskusi dengan AI asisten Anda.<br>
            <span style="font-size:12px; color:var(--text-secondary); margin-top: 8px; display: inline-block;">Ketik '/help' atau pilih fitur untuk memulai aktivitas spesifik.</span>
        </div>
    </div>
</div>

<div class="input-area">
    <input type="file" id="file-upload" style="display:none;" accept="image/*,.txt,.csv,.md,.json,.js,.py,.docx">
    <button id="upload-btn" title="Upload File" class="icon-btn-sm" onclick="document.getElementById('file-upload').click()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M21.44 11.05L12.25 20.24C11.12 21.37 9.6 22 8 22s-3.12-.63-4.24-1.76C2.63 19.11 2 17.59 2 16s.63-3.11 1.76-4.25L12.95 2.56c.75-.75 1.77-1.17 2.83-1.17s2.08.42 2.83 1.17c.75.75 1.17 1.77 1.17 2.83s-.42 2.08-1.17 2.83L9.42 17.41C9.04 17.79 8.53 18 8 18s-1.03-.21-1.41-.59C6.21 17.03 6 16.53 6 16s.21-1.03.59-1.41L15.07 6.1" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <textarea id="user-input" placeholder="Tanya AutomateBoty..." rows="1"></textarea>
    <button id="send-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
</div>
